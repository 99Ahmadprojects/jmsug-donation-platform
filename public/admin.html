<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMSUG - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fbfa; color: #333; margin: 0; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h2 { color: #1f5b8b; margin: 0; }
        .download-btn { background-color: #1f5b8b; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .download-btn:hover { background-color: #154366; }
        
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #1f5b8b; color: white; }
        
        .status-pending { color: #856404; background-color: #fff3cd; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-verified { color: #155724; background-color: #d4edda; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        
        .verify-btn { background-color: #28a745; color: white; padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .verify-btn:hover { background-color: #218838; }
        .verify-btn:disabled { background-color: #6c757d; cursor: not-allowed; }
        
        .proof-link { color: #1f5b8b; text-decoration: none; font-weight: bold; }
        .proof-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Donation Verification Dashboard</h2>
        <button id="downloadBtn" class="download-btn">⬇ Download CSV Data</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Category</th>
                <th>Payment Proof</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="7" style="text-align: center;">Loading donations...</td></tr>
        </tbody>
    </table>

    <script>
        let allDonations = [];

        // 1. Fetch data when page loads
        async function loadData() {
            try {
                const response = await fetch('/api/admin/donations');
                allDonations = await response.json();
                renderTable();
            } catch (error) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" style="text-align: center; color: red;">Failed to load data.</td></tr>';
            }
        }

        // 2. Render the table rows
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (allDonations.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No donations found.</td></tr>';
                return;
            }

            allDonations.forEach(doc => {
                const date = new Date(doc.created_at || doc._id).toLocaleDateString('en-PK');
                const isVerified = doc.status === 'VERIFIED';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${date}</td>
                    <td>${doc.name}</td>
                    <td>${doc.phone}</td>
                    <td>${doc.category}</td>
                    <td><a href="${doc.paymentProofUrl}" target="_blank" class="proof-link">🔍 View Proof</a></td>
                    <td><span class="${isVerified ? 'status-verified' : 'status-pending'}">${doc.status.replace('_', ' ')}</span></td>
                    <td>
                        ${!isVerified ? `<button class="verify-btn" onclick="verifyDonation('${doc._id}', this)">✅ Approve</button>` : '<span>✔️ Done</span>'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 3. Verify Button Action
        async function verifyDonation(id, buttonElement) {
            if (!confirm('Are you sure you want to approve this donation and send the confirmation message?')) return;

            buttonElement.disabled = true;
            buttonElement.textContent = 'Approving...';

            try {
                const response = await fetch(`/api/admin/donations/${id}/verify`, { method: 'POST' });
                if (!response.ok) throw new Error('Failed to verify');

                alert('Donation approved! Confirmation message sent to the user.');
                loadData(); // Reload table to show updated status
            } catch (error) {
                alert('Error verifying donation. Please check server logs.');
                buttonElement.disabled = false;
                buttonElement.textContent = '✅ Approve';
            }
        }

        // 4. Download CSV functionality (Kept from previous version)
        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (allDonations.length === 0) return alert("No data to download.");
            
            const headers = ['Date', 'Name', 'Phone', 'Category', 'Status', 'Payment Proof Link'];
            const rows = allDonations.map(doc => [
                new Date(doc.created_at || doc._id).toLocaleDateString('en-PK'),
                `"${doc.name}"`, doc.phone, `"${doc.category}"`, doc.status, doc.paymentProofUrl
            ].join(','));
            
            const csvContent = headers.join(',') + '\n' + rows.join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `JMSUG_Donations_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        });

        // Initialize page
        loadData();
    </script>
</body>
</html>
